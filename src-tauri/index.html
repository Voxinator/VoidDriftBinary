                explodeAsteroid(a.x, a.y, a.size);
                breakAsteroid(a);
                a.alive = false;
                break;
            }
        }
    }

    // Enemy bullets vs other enemies (friendly fire)
    for (var ebi = gameState.enemyBullets.length - 1; ebi >= 0; ebi--) {
        var eb = gameState.enemyBullets[ebi];
        if (!eb.alive) continue;
        for (var ei = enemies.length - 1; ei >= 0; ei--) {
            var e = enemies[ei];
            if (!e.alive || e.dying || e === eb.owner) continue;
            if (gameDist(eb.x, eb.y, e.x, e.y) < eb.radius + e.radius) {
                eb.alive = false;
                bulletImpact(eb.x, eb.y);
                e.damageFlashTimer = 150;
                if (e.shields > 0) {
                    e.shields--;
                    sparkShield(e.x, e.y);
                } else {
                    e.hp--;
                    if (e.hp <= 0) {
                        killEnemy(e);
                    } else {
                        e.damaged = true;
                        var roll2 = Math.random();
                        if (roll2 < 0.33) { e.behavior = 'retreat'; }
                        else if (roll2 < 0.66) { e.behavior = 'aggressive'; }
                    }
                }
                break;
            }
        }
    }

    // Lasers vs asteroids (on existing lasers that just spawned)
    for (var li = 0; li < gameState.lasers.length; li++) {
        var l = gameState.lasers[li];
        if (gameState.time - l.createTime > 50) continue;
        for (var ai = asteroids.length - 1; ai >= 0; ai--) {
            var a = asteroids[ai];
            if (!a.alive) continue;
            var ld = pointToSegDist(a.x, a.y, l.x1, l.y1, l.x2, l.y2);
            if (ld < a.radius + l.width) {
                explodeAsteroid(a.x, a.y, a.size);
                breakAsteroid(a);
                a.alive = false;
            }
        }
    }

    // Asteroid-asteroid collisions (bounce)
    for (var ai = 0; ai < asteroids.length; ai++) {
        var a1 = asteroids[ai];
        if (!a1.alive) continue;
        for (var aj = ai + 1; aj < asteroids.length; aj++) {
            var a2 = asteroids[aj];
            if (!a2.alive) continue;
            var adist = gameDist(a1.x, a1.y, a2.x, a2.y);
            var minDist = a1.radius + a2.radius;
            if (adist < minDist && adist > 0) {
                // Push apart
                var nx = (a2.x - a1.x) / adist;
                var ny = (a2.y - a1.y) / adist;
                var overlap = (minDist - adist) * 0.5;
                a1.x -= nx * overlap;
                a1.y -= ny * overlap;
                a2.x += nx * overlap;
                a2.y += ny * overlap;
                // Swap velocity components along collision normal
                var relVx = a1.vx - a2.vx;
                var relVy = a1.vy - a2.vy;
                var dot = relVx * nx + relVy * ny;
                if (dot > 0) {
                    a1.vx -= nx * dot * 0.8;
                    a1.vy -= ny * dot * 0.8;
                    a2.vx += nx * dot * 0.8;
                    a2.vy += ny * dot * 0.8;
                }
            }
        }
    }

    // Enemy bullets vs players
    for (var cpi3 = 0; cpi3 < gameState.players.length; cpi3++) {
        var p = gameState.players[cpi3];
        if (p && p.alive && !p.invulnerable) {
            for (var ebi = gameState.enemyBullets.length - 1; ebi >= 0; ebi--) {
                var eb = gameState.enemyBullets[ebi];
                if (!eb.alive) continue;
                if (gameDist(p.x, p.y, eb.x, eb.y) < eb.radius + p.radius) {
                    eb.alive = false;
                    bulletImpact(eb.x, eb.y);
                    hitPlayer(p, eb.x, eb.y);
                }
            }
        }
    }

    // Player bullets vs carriers
    for (var cci = 0; cci < gameState.carriers.length; cci++) {
        var car = gameState.carriers[cci];
        if (car && car.alive) {
            for (var bi = bullets.length - 1; bi >= 0; bi--) {
                var b = bullets[bi];
                if (!b.alive) continue;
                if (!car.alive) break;
                if (gameDist(b.x, b.y, car.x, car.y) < b.radius + car.radius) {
                    b.alive = false;
                    if (car.shields > 0) {
                        car.shields--;
                        sparkShield(b.x, b.y);
                    } else {
                        bulletImpact(b.x, b.y);
                        carrierTakeDamage(car, 1);
                    }
                }
            }
        }

        // Player ships vs carrier
        if (car && car.alive) {
            for (var cpi4 = 0; cpi4 < gameState.players.length; cpi4++) {
                var p = gameState.players[cpi4];
                if (p && p.alive && !p.invulnerable) {
                    if (gameDist(p.x, p.y, car.x, car.y) < p.radius + car.radius) {
                        hitPlayer(p, car.x, car.y);
                    }
                }
            }
        }

        // Asteroid vs carrier
        if (car && car.alive) {
            for (var ai = asteroids.length - 1; ai >= 0; ai--) {
                var a = asteroids[ai];
                if (!a.alive) continue;
                if (gameDist(a.x, a.y, car.x, car.y) < a.radius + car.radius) {
                    carrierTakeDamage(car, 5);
                    explodeAsteroid(a.x, a.y, a.size);
                    breakAsteroid(a);
                    a.alive = false;
                }
            }
        }
    }

    for (var bi = bullets.length - 1; bi >= 0; bi--) {
        if (!bullets[bi].alive) bullets.splice(bi, 1);
    }
    for (var ei = enemies.length - 1; ei >= 0; ei--) {
        if (!enemies[ei].alive) enemies.splice(ei, 1);
    }
    for (var ai = asteroids.length - 1; ai >= 0; ai--) {
        if (!asteroids[ai].alive) asteroids.splice(ai, 1);
    }
    for (var ebi = gameState.enemyBullets.length - 1; ebi >= 0; ebi--) {
        if (!gameState.enemyBullets[ebi].alive) gameState.enemyBullets.splice(ebi, 1);
    }
}

function hitPlayer(p, hitX, hitY) {
    if (_godMode && (p.isLocal || (role === 'host' && gameState.players.indexOf(p) === 0))) {
        sparkShield(hitX, hitY);
        return;
    }
    p.drifting = false;
    p.driftVx = 0;
    p.driftVy = 0;

    if (p.shields > 0) {
        p.shields--;
        sparkShield(hitX, hitY);
        p.invulnerable = true;
        p.invulnerableTimer = 300;
    } else {
        p.alive = false;
        p.deathTime = gameState.time;
        p.respawning = false;
        p.level = 1;
        p.baseShields = 1;
        p.fireRate = 1000;
        p.shotIndex = 0;
        explodePlayer(p.x, p.y);
        addExplosionZone(p.x, p.y, 150);
        gameState.screenFlashAlpha = 0.25;
        gameState.screenShake.intensity = 18;
        // Player death AoE
        var aoeRadius = 80;
        for (var ei = gameState.enemies.length - 1; ei >= 0; ei--) {
            var ae = gameState.enemies[ei];
            if (!ae.alive || ae.dying) continue;
            if (gameDist(ae.x, ae.y, p.x, p.y) < aoeRadius + ae.radius) {
                killEnemy(ae);
            }
        }
        for (var ai = gameState.asteroids.length - 1; ai >= 0; ai--) {
            var aa = gameState.asteroids[ai];
            if (!aa.alive) continue;
            if (gameDist(aa.x, aa.y, p.x, p.y) < aoeRadius + aa.radius) {
                explodeAsteroid(aa.x, aa.y, aa.size);
                breakAsteroid(aa);
                aa.alive = false;
            }
        }
        for (var cci = 0; cci < gameState.carriers.length; cci++) {
            var car = gameState.carriers[cci];
            if (car && car.alive) {
                if (gameDist(car.x, car.y, p.x, p.y) < aoeRadius + car.radius) {
                    carrierTakeDamage(car, 5);
                }
            }
        }
    }
}

function drawPlayers() {
    for (var dpi = 0; dpi < gameState.players.length; dpi++) {
    var p = gameState.players[dpi];
    if (!p) continue;

    if (!p.alive && p.respawning) {
        drawWarpAnimation(p);
        continue;
    }

    if (!p.alive) continue;

    gameCtx.save();
    gameCtx.translate(p.x, p.y);
    gameCtx.rotate(p.angle);
    gameCtx.scale(p.scale, p.scale);
    gameCtx.globalAlpha = p.opacity;

    var shipCount = p.level;
    var spacing = 8;

    for (var si = 0; si < shipCount; si++) {
        var offset = shipCount === 1 ? 0 : (si - (shipCount - 1) / 2) * spacing;

        gameCtx.save();
        gameCtx.translate(0, offset);

        drawGlow(gameCtx, 0, 0, p.color, 24, 0.5);

        gameCtx.beginPath();
        gameCtx.moveTo(12, 0);
        gameCtx.lineTo(-10, -8);
        gameCtx.lineTo(-6, 0);
        gameCtx.lineTo(-10, 8);
        gameCtx.closePath();

        gameCtx.fillStyle = p.color;
        gameCtx.fill();
        gameCtx.strokeStyle = '#88FFFF';
        gameCtx.lineWidth = 1;
        gameCtx.stroke();

        if (p.drifting) {
            gameCtx.globalAlpha = 0.3;
            gameCtx.beginPath();
            gameCtx.arc(-7, 0, 1.5, 0, Math.PI * 2);
            gameCtx.fillStyle = p.color;
            gameCtx.fill();
            gameCtx.globalAlpha = p.opacity;
        } else {
            drawGlow(gameCtx, -7, 0, '#FFFFFF', 16, 0.4);
            gameCtx.beginPath();
            gameCtx.arc(-7, 0, 2.5, 0, Math.PI * 2);
            gameCtx.fillStyle = '#FFFFFF';
            gameCtx.fill();
        }

        gameCtx.restore();
    }

    gameCtx.restore();

    drawShields(p);
    } // end players loop
}

function drawShields(p) {
    var shieldColor = p.color || '#00FFFF';
    var shieldsToDraw = Math.max(p.shields, p.shields < p.baseShields ? p.baseShields : p.shields);

    // Pass 1: Active shields
    gameCtx.save();
    gameCtx.fillStyle = shieldColor;
    gameCtx.globalAlpha = 0.9;
    for (var i = 0; i < Math.min(p.shields, shieldsToDraw); i++) {
        var orbitAngle = p.shieldAngle + (i * Math.PI * 2 / p.maxShields);
        var sx = p.x + Math.cos(orbitAngle) * 30;
        var sy = p.y + Math.sin(orbitAngle) * 30;
        drawGlow(gameCtx, sx, sy, shieldColor, 12, 0.4);
        gameCtx.beginPath();
        gameCtx.arc(sx, sy, 3, 0, Math.PI * 2);
        gameCtx.fill();
    }
    gameCtx.restore();

    // Pass 2: Recharging shields — no shadowBlur
    if (p.shields < p.baseShields) {
        gameCtx.save();
        for (var i = p.shields; i < p.baseShields; i++) {
            var orbitAngle = p.shieldAngle + (i * Math.PI * 2 / p.maxShields);
            var sx = p.x + Math.cos(orbitAngle) * 30;
            var sy = p.y + Math.sin(orbitAngle) * 30;
            var fillRatio = p.shieldRechargeTimer / p.shieldRechargeRate;
            gameCtx.globalAlpha = 0.3;
            gameCtx.strokeStyle = shieldColor;
            gameCtx.lineWidth = 1;
            gameCtx.beginPath();
            gameCtx.arc(sx, sy, 3, 0, Math.PI * 2);
            gameCtx.stroke();

            gameCtx.globalAlpha = 0.6;
            gameCtx.fillStyle = shieldColor;
            gameCtx.beginPath();
            gameCtx.moveTo(sx, sy);
            gameCtx.arc(sx, sy, 3, -Math.PI / 2, -Math.PI / 2 + fillRatio * Math.PI * 2);
            gameCtx.closePath();
            gameCtx.fill();
        }
        gameCtx.restore();
    }
}

function updateShieldPickups(dt) {
    for (var i = gameState.shieldPickups.length - 1; i >= 0; i--) {
        var sp = gameState.shieldPickups[i];
        sp.life -= dt;
        sp.pulsePhase += 0.08;

        // Player pickup — nearest player picks up
        var pickedByPlayer = false;
        for (var spi2 = 0; spi2 < gameState.players.length; spi2++) {
            var p = gameState.players[spi2];
            if (p && p.alive && p.shields < p.maxShields) {
                if (gameDist(p.x, p.y, sp.x, sp.y) < sp.pickupRadius + p.radius) {
                    p.shields++;
                    sp.alive = false;
                    sfxAt('shield-pickup', sp.x, sp.y, { volume: 0.5 });
                    // Pickup sparkle effect
                    sparkShield(sp.x, sp.y);
                    // Check for upgrade
                    if (p.shields >= p.maxShields && p.level < 4) {
                        p.level++;
                        p.baseShields = p.level;
                        p.shields = p.baseShields;
                        p.fireRate = 1000 / p.level;
                        p.shotIndex = 0;
                        sparkShield(p.x, p.y);
                        sparkShield(p.x, p.y);
                        gameState.ringWaves.push({
                            x: p.x, y: p.y,
                            radius: 0, maxRadius: 80,
                            expandSpeed: 4, lineWidth: 3,
                            color: p.color, alpha: 0.8
                        });
                    }
                    gameState.shieldPickups.splice(i, 1);
                    pickedByPlayer = true;
                    break;
                }
            }
        }
        if (pickedByPlayer) continue;

        // Enemy pickup
        var pickedUp = false;
        for (var ei = 0; ei < gameState.enemies.length; ei++) {
            var en = gameState.enemies[ei];
            if (!en.alive || en.shields >= en.maxShields) continue;
            if (gameDist(en.x, en.y, sp.x, sp.y) < sp.pickupRadius + en.radius) {
                en.shields++;
                sp.alive = false;
                bulletImpact(sp.x, sp.y);
                gameState.shieldPickups.splice(i, 1);
                pickedUp = true;
                break;
            }
        }
        if (pickedUp) continue;

        // Expire - explode like a mine
        if (sp.life <= 0) {
            sp.alive = false;
            bulletImpact(sp.x, sp.y);
            gameState.ringWaves.push({
                x: sp.x, y: sp.y,
                radius: 0, maxRadius: 50,
                expandSpeed: 4, lineWidth: 2,
                color: '#00FFFF', alpha: 0.6
            });
            // AoE damage — hits everything nearby
            var aoeRadius = 50;
            for (var mpi = 0; mpi < gameState.players.length; mpi++) {
                var mp = gameState.players[mpi];
                if (mp && mp.alive && !mp.invulnerable) {
                    if (gameDist(mp.x, mp.y, sp.x, sp.y) < aoeRadius + mp.radius) {
                        hitPlayer(mp, sp.x, sp.y);
                    }
                }
            }
            for (var ei = gameState.enemies.length - 1; ei >= 0; ei--) {
                var ae = gameState.enemies[ei];
                if (!ae.alive || ae.dying) continue;
                if (gameDist(ae.x, ae.y, sp.x, sp.y) < aoeRadius + ae.radius) {
                    ae.hp -= 2;
                    ae.damageFlashTimer = 150;
                    if (ae.hp <= 0) {
                        killEnemy(ae);
                    }
                }
            }
            for (var ai = gameState.asteroids.length - 1; ai >= 0; ai--) {
                var aa = gameState.asteroids[ai];
                if (!aa.alive) continue;
                if (gameDist(aa.x, aa.y, sp.x, sp.y) < aoeRadius + aa.radius) {
                    explodeAsteroid(aa.x, aa.y, aa.size);
                    breakAsteroid(aa);
                    aa.alive = false;
                }
            }
            // AoE vs carriers
            for (var cci = 0; cci < gameState.carriers.length; cci++) {
                var aoeCarrier = gameState.carriers[cci];
                if (aoeCarrier && aoeCarrier.alive) {
                    if (gameDist(aoeCarrier.x, aoeCarrier.y, sp.x, sp.y) < aoeRadius + aoeCarrier.radius) {
                        carrierTakeDamage(aoeCarrier, 3);
                    }
                }
            }
            gameState.shieldPickups.splice(i, 1);
            continue;
        }
    }
}

function drawShieldPickups() {
    gameCtx.save();
    gameCtx.globalCompositeOperation = 'lighter';
    for (var i = 0; i < gameState.shieldPickups.length; i++) {
        var sp = gameState.shieldPickups[i];
        var pulse = 0.7 + Math.sin(sp.pulsePhase) * 0.3;
        var timeLeft = sp.life / 10000;

        // Blink faster when about to expire (last 3 seconds)
        var visible = true;
        if (sp.life < 3000) {
            visible = Math.sin(sp.pulsePhase * 3) > -0.3;
        }
        if (!visible) continue;

        drawGlow(gameCtx, sp.x, sp.y, '#00FFFF', 16, 0.3);
        gameCtx.save();
        gameCtx.translate(sp.x, sp.y);
        gameCtx.rotate(sp.pulsePhase * 0.3);

        // Outer glow
        gameCtx.globalAlpha = 0.4 * pulse;
        gameCtx.fillStyle = '#00FFFF';
        gameCtx.beginPath();
        gameCtx.arc(0, 0, sp.radius * 1.5 * pulse, 0, Math.PI * 2);
        gameCtx.fill();

        // Diamond shape
        gameCtx.globalAlpha = 0.9 * pulse;
        gameCtx.fillStyle = '#00FFFF';
        gameCtx.beginPath();
        gameCtx.moveTo(0, -sp.radius);
        gameCtx.lineTo(sp.radius * 0.6, 0);
        gameCtx.lineTo(0, sp.radius);
        gameCtx.lineTo(-sp.radius * 0.6, 0);
        gameCtx.closePath();
        gameCtx.fill();

        // White center
        gameCtx.fillStyle = '#FFFFFF';
        gameCtx.globalAlpha = 0.8 * pulse;
        gameCtx.beginPath();
        gameCtx.arc(0, 0, 3, 0, Math.PI * 2);
        gameCtx.fill();

        gameCtx.restore();
    }
    gameCtx.restore();
}

function drawWarpAnimation(p) {
    var t = p.warpPhase;
    gameCtx.save();
    gameCtx.translate(p.x, p.y);

    if (t < 0.33) {
        var lineLen = lerp(0, 100, t / 0.33);
        drawGlow(gameCtx, 0, 0, '#00FFFF', 30, 0.4);
        gameCtx.strokeStyle = '#FFFFFF';
        gameCtx.lineWidth = 2;
        gameCtx.globalAlpha = 0.8;
        gameCtx.beginPath();
        gameCtx.moveTo(-lineLen / 2, 0);
        gameCtx.lineTo(lineLen / 2, 0);
        gameCtx.stroke();
    } else if (t < 0.66) {
        var ph = (t - 0.33) / 0.33;
        var rx = lerp(50, 30, ph);
        var ry = lerp(2, 25, ph);
        drawGlow(gameCtx, 0, 0, '#8844FF', 30, 0.4);
        gameCtx.strokeStyle = '#00FFFF';
        gameCtx.lineWidth = 2;
        gameCtx.globalAlpha = lerp(0.8, 0.6, ph);
        gameCtx.beginPath();
        gameCtx.ellipse(0, 0, rx, ry, 0, 0, Math.PI * 2);
        gameCtx.stroke();

        for (var r = 1; r <= 3; r++) {
            gameCtx.globalAlpha = 0.3 - r * 0.08;
            gameCtx.strokeStyle = r % 2 === 0 ? '#CC88FF' : '#FFFFFF';
            gameCtx.beginPath();
            gameCtx.ellipse(0, 0, rx * (1 - r * 0.2), ry * (1 - r * 0.2), 0, 0, Math.PI * 2);
            gameCtx.stroke();
        }
    } else {
        var ph = (t - 0.66) / 0.34;

        var portalR = lerp(30, 0, ph);
        if (portalR > 1) {
            drawGlow(gameCtx, 0, 0, '#CC88FF', 30, 0.4);
            gameCtx.strokeStyle = '#CC88FF';
            gameCtx.lineWidth = 1;
            gameCtx.globalAlpha = 1 - ph;
            gameCtx.beginPath();
            gameCtx.arc(0, 0, portalR, 0, Math.PI * 2);
            gameCtx.stroke();
        }

        gameCtx.globalAlpha = ph;
        gameCtx.rotate(p.angle);
        gameCtx.scale(lerp(2, 1, ph), lerp(2, 1, ph));

        var warpShipCount = p.level;
        var warpSpacing = 8;
        for (var wsi = 0; wsi < warpShipCount; wsi++) {
            var warpOffset = warpShipCount === 1 ? 0 : (wsi - (warpShipCount - 1) / 2) * warpSpacing;
            gameCtx.save();
            gameCtx.translate(0, warpOffset);
            drawGlow(gameCtx, 0, 0, p.color, 24, 0.5);
            gameCtx.beginPath();
            gameCtx.moveTo(12, 0);
            gameCtx.lineTo(-10, -8);
            gameCtx.lineTo(-6, 0);
            gameCtx.lineTo(-10, 8);
            gameCtx.closePath();
            gameCtx.fillStyle = p.color;
            gameCtx.fill();
            gameCtx.restore();
        }
    }

    gameCtx.restore();
}

function drawBullets() {
    gameCtx.save();

    var alphas = [0.1, 0.2, 0.4, 0.6];
    for (var i = 0; i < gameState.bullets.length; i++) {
        var b = gameState.bullets[i];
        if (b.x < -50 || b.x > canvasW + 50 || b.y < -50 || b.y > canvasH + 50) continue;

        var bColor = b.color || '#00FFFF';
        drawGlow(gameCtx, b.x, b.y, bColor, 12, 0.5);
        gameCtx.fillStyle = bColor;

        for (var t = 0; t < b.trail.length; t++) {
            gameCtx.globalAlpha = alphas[t] || 0.1;
            gameCtx.save();
            gameCtx.translate(b.trail[t].x, b.trail[t].y);
            gameCtx.rotate(b.angle);
            gameCtx.beginPath();
            gameCtx.ellipse(0, 0, 4, 1.5, 0, 0, Math.PI * 2);
            gameCtx.fill();
            gameCtx.restore();
        }

        gameCtx.globalAlpha = 1;
        gameCtx.save();
        gameCtx.translate(b.x, b.y);
        gameCtx.rotate(b.angle);

        gameCtx.beginPath();
        gameCtx.ellipse(0, 0, 4, 1.5, 0, 0, Math.PI * 2);
        gameCtx.fill();

        gameCtx.fillStyle = '#FFFFFF';
        gameCtx.beginPath();
        gameCtx.ellipse(0, 0, 2, 0.8, 0, 0, Math.PI * 2);
        gameCtx.fill();

        gameCtx.restore();
    }
    gameCtx.restore();
}

function drawEnemies() {
    // Pass 1: All enemy bodies
    gameCtx.save();
    for (var i = 0; i < gameState.enemies.length; i++) {
        var e = gameState.enemies[i];
        if (e.x < -50 || e.x > canvasW + 50 || e.y < -50 || e.y > canvasH + 50) continue;
        if (e.charging > 0) continue; // drawn in pass 2
        gameCtx.save();
        gameCtx.globalAlpha = e.fadeIn;
        gameCtx.translate(e.x, e.y);

        var drawColor = e.color;
        if (e.dying) {
            drawColor = Math.random() > 0.4 ? '#FF4400' : Math.random() > 0.5 ? '#FF8800' : '#FFFFFF';
            gameCtx.globalAlpha *= (0.4 + Math.random() * 0.5);
        } else if (e.damageFlashTimer > 0) {
            drawColor = '#FFFFFF';
        }

        if (e.elite && !e.dying) {
            // Pulsing elite ring
            var elitePulse = 0.4 + Math.sin(gameState.time / 200) * 0.25;
            drawGlow(gameCtx, 0, 0, '#FFFFFF', e.radius + 24, elitePulse);
            drawGlow(gameCtx, 0, 0, drawColor, e.radius + 16, 0.6);
            // White outline ring
            var ringPulse = 0.3 + Math.sin(gameState.time / 150) * 0.2;
            gameCtx.strokeStyle = 'rgba(255,255,255,' + ringPulse + ')';
            gameCtx.lineWidth = 1.5;
            gameCtx.beginPath();
            gameCtx.arc(0, 0, e.radius + 6, 0, Math.PI * 2);
            gameCtx.stroke();
        } else {
            drawGlow(gameCtx, 0, 0, drawColor, e.radius + 10, 0.4);
        }

        if (e.type === 'saucer') {
            drawSaucer(e, e.elite && !e.dying ? '#FFFFFF' : drawColor);
        } else {
            drawFighter(e, e.elite && !e.dying ? '#FFFFFF' : drawColor);
        }

        // Draw colored core on top for elites so the color still shows
        if (e.elite && !e.dying) {
            gameCtx.globalAlpha *= 0.5;
            if (e.type === 'saucer') {
                drawSaucer(e, drawColor);
            } else {
                drawFighter(e, drawColor);
            }
            gameCtx.globalAlpha /= 0.5;
        }

        if (e.damaged && Math.random() > 0.7) {
            gameCtx.globalAlpha *= 0.5;
        }

        gameCtx.restore();
    }
    gameCtx.restore();

    // Pass 2: Charging enemies — higher shadowBlur
    for (var i = 0; i < gameState.enemies.length; i++) {
        var e = gameState.enemies[i];
        if (e.charging <= 0) continue;
        if (e.x < -50 || e.x > canvasW + 50 || e.y < -50 || e.y > canvasH + 50) continue;
        gameCtx.save();
        gameCtx.globalAlpha = e.fadeIn;
        gameCtx.translate(e.x, e.y);

        var r = parseInt(e.color.slice(1,3), 16);
        var g = parseInt(e.color.slice(3,5), 16);
        var b = parseInt(e.color.slice(5,7), 16);
        var c = e.charging;
        r = Math.round(r + (255 - r) * c);
        g = Math.round(g + (255 - g) * c);
        b = Math.round(b + (255 - b) * c);
        var drawColor = 'rgb(' + r + ',' + g + ',' + b + ')';

        drawGlow(gameCtx, 0, 0, drawColor, e.radius + 10 + e.charging * 20, 0.5);

        if (e.type === 'saucer') {
            drawSaucer(e, drawColor);
        } else {
            drawFighter(e, drawColor);
        }

        gameCtx.restore();
    }

    // Pass 3: All enemy shields
    gameCtx.save();
    for (var i = 0; i < gameState.enemies.length; i++) {
        var e = gameState.enemies[i];
        if (e.shields <= 0) continue;
        if (e.x < -50 || e.x > canvasW + 50 || e.y < -50 || e.y > canvasH + 50) continue;
        gameCtx.fillStyle = e.color;
        for (var esi = 0; esi < e.shields; esi++) {
            var esa = e.shieldAngle + (esi * Math.PI * 2 / e.maxShields);
            var esx = e.x + Math.cos(esa) * (e.radius + 8);
            var esy = e.y + Math.sin(esa) * (e.radius + 8);
            drawGlow(gameCtx, esx, esy, e.color, 8, 0.3);
            gameCtx.globalAlpha = 0.8 * e.fadeIn;
            gameCtx.beginPath();
            gameCtx.arc(esx, esy, 2.5, 0, Math.PI * 2);
            gameCtx.fill();
        }
    }
    gameCtx.restore();
}

function drawSaucer(e, color) {
    var hw = e.size / 2;
    var hh = e.size / 4;

    gameCtx.fillStyle = color;
    gameCtx.beginPath();
    gameCtx.ellipse(0, 0, hw, hh, 0, 0, Math.PI * 2);
    gameCtx.fill();
    gameCtx.strokeStyle = '#FFFFFF';
    gameCtx.lineWidth = 0.5;
    gameCtx.globalAlpha *= 0.5;
    gameCtx.stroke();
    gameCtx.globalAlpha *= 2;

    gameCtx.fillStyle = color;
    gameCtx.globalAlpha *= 0.7;
    gameCtx.beginPath();
    gameCtx.ellipse(0, -hh * 0.5, hw * 0.5, hh * 0.8, 0, Math.PI, 0);
    gameCtx.fill();
    gameCtx.globalAlpha /= 0.7;

    gameCtx.fillStyle = color;
    gameCtx.globalAlpha *= 0.6;
    gameCtx.fillRect(-hw - 4, -2, 6, 4);
    gameCtx.fillRect(hw - 2, -2, 6, 4);
    gameCtx.globalAlpha /= 0.6;
}

function drawFighter(e, color) {
    var hw = e.size / 2;

    gameCtx.fillStyle = color;
    gameCtx.beginPath();
    gameCtx.moveTo(hw * 0.7, 0);
    gameCtx.lineTo(0, -hw * 0.35);
    gameCtx.lineTo(-hw * 0.7, 0);
    gameCtx.lineTo(0, hw * 0.35);
    gameCtx.closePath();

    gameCtx.lineTo(-hw * 0.8, -hw * 0.7);

    gameCtx.fill();

    gameCtx.moveTo(-hw * 0.2, hw * 0.3);

function drawAsteroids() {
    for (var i = 0; i < gameState.asteroids.length; i++) {
        var a = gameState.asteroids[i];
        if (a.x < -50 || a.x > canvasW + 50 || a.y < -50 || a.y > canvasH + 50) continue;
        gameCtx.save();
        gameCtx.translate(a.x, a.y);
        gameCtx.rotate(a.rotation);

        var grayVal = a.size === 'large' ? '#666666' : a.size === 'medium' ? '#777777' : '#888888';

        gameCtx.fillStyle = grayVal;
        gameCtx.strokeStyle = '#999999';
        gameCtx.lineWidth = 1;
        gameCtx.beginPath();
        for (var v = 0; v < a.vertices.length; v++) {
            var vt = a.vertices[v];
            var vx = Math.cos(vt.angle) * vt.r;
            var vy = Math.sin(vt.angle) * vt.r;
            if (v === 0) gameCtx.moveTo(vx, vy);
            else gameCtx.lineTo(vx, vy);
        }
        gameCtx.closePath();
        gameCtx.fill();
        gameCtx.stroke();

        for (var c = 0; c < a.craters.length; c++) {
            var cr = a.craters[c];
            gameCtx.fillStyle = '#444444';
            gameCtx.globalAlpha = 0.5;
            gameCtx.beginPath();
            gameCtx.arc(cr.x, cr.y, cr.r, 0, Math.PI * 2);
            gameCtx.fill();
            gameCtx.globalAlpha = 1;
        }

        gameCtx.restore();
    }
}

function drawEnemyBullets() {
    gameCtx.save();
    gameCtx.globalCompositeOperation = 'lighter';

    // Pass 1: All trails — semi-transparent circles
    for (var i = 0; i < gameState.enemyBullets.length; i++) {
        var b = gameState.enemyBullets[i];
        if (!b.alive || !b.trail) continue;
        if (b.x < -50 || b.x > canvasW + 50 || b.y < -50 || b.y > canvasH + 50) continue;
        gameCtx.fillStyle = b.color;
        for (var ti = 0; ti < b.trail.length; ti++) {
            var t = b.trail[ti];
            gameCtx.globalAlpha = (ti / b.trail.length) * 0.4;
            gameCtx.beginPath();
            gameCtx.arc(t.x, t.y, b.radius * (0.3 + 0.5 * (ti / b.trail.length)), 0, Math.PI * 2);
            gameCtx.fill();
        }
    }

    // Pass 2: All torpedo cores — colored circle + white center
    for (var i = 0; i < gameState.enemyBullets.length; i++) {
        var b = gameState.enemyBullets[i];
        if (!b.alive) continue;
        if (b.x < -50 || b.x > canvasW + 50 || b.y < -50 || b.y > canvasH + 50) continue;
        var pulse = 0.8 + Math.sin(b.pulsePhase) * 0.2;

        drawGlow(gameCtx, b.x, b.y, b.color, 16, 0.5);
        gameCtx.fillStyle = b.color;
        gameCtx.globalAlpha = 1;
        gameCtx.beginPath();
        gameCtx.arc(b.x, b.y, b.radius * pulse, 0, Math.PI * 2);
        gameCtx.fill();

        gameCtx.fillStyle = '#fff';
        gameCtx.beginPath();
        gameCtx.arc(b.x, b.y, b.radius * 0.4 * pulse, 0, Math.PI * 2);
        gameCtx.fill();
    }

    gameCtx.restore();
}

function drawLasers() {
    if (gameState.lasers.length === 0) return;
    // Pass 1: Laser beams
    gameCtx.save();
    gameCtx.globalCompositeOperation = 'lighter';
    for (var i = 0; i < gameState.lasers.length; i++) {
        var l = gameState.lasers[i];
        gameCtx.globalAlpha = l.alpha;
        gameCtx.strokeStyle = l.color;
        gameCtx.lineWidth = l.width;
        gameCtx.beginPath();
        gameCtx.moveTo(l.x1, l.y1);
        gameCtx.lineTo(l.x2, l.y2);
        gameCtx.stroke();
    }
    // Pass 2: Hit flashes
    for (var i = 0; i < gameState.lasers.length; i++) {
        var l = gameState.lasers[i];
        if (!l.hit) continue;
        var elapsed = l.maxLife - l.life;
        if (elapsed < 200) {
            var flashAlpha = 1 - elapsed / 200;
            drawGlow(gameCtx, l.hitX, l.hitY, l.color, 30, 0.5);
            gameCtx.globalAlpha = flashAlpha;
            gameCtx.fillStyle = '#FFFFFF';
            gameCtx.beginPath();
            gameCtx.arc(l.hitX, l.hitY, 8 + (1 - flashAlpha) * 12, 0, Math.PI * 2);
            gameCtx.fill();
        }
    }
    gameCtx.restore();
}

function drawParticles() {
    var highCount = gameState.particles.length > 300;

    gameCtx.save();
    gameCtx.globalCompositeOperation = 'source-over';
    for (var i = 0; i < gameState.particles.length; i++) {
        var p = gameState.particles[i];
        if (p.glow) continue;
        if (p.x < -50 || p.x > canvasW + 50 || p.y < -50 || p.y > canvasH + 50) continue;
        drawSingleParticle(p, false);
    }
    gameCtx.restore();

    gameCtx.save();
    gameCtx.globalCompositeOperation = 'lighter';
    for (var i = 0; i < gameState.particles.length; i++) {
        var p = gameState.particles[i];
        if (!p.glow) continue;
        if (p.x < -50 || p.x > canvasW + 50 || p.y < -50 || p.y > canvasH + 50) continue;

    gameCtx.restore();

function drawSingleParticle(p, useGlow) {
    gameCtx.save();
    gameCtx.globalAlpha = p.alpha;


    gameCtx.fillStyle = p.color;
    gameCtx.strokeStyle = p.color;

    if (p.type === 'circle') {
        gameCtx.beginPath();
        gameCtx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
        gameCtx.fill();
    } else if (p.type === 'spark') {
        gameCtx.lineWidth = Math.max(0.5, p.radius * 0.5);
        var len = Math.sqrt(p.vx * p.vx + p.vy * p.vy) * 3;
        if (len < 2) len = 2;
        var sa = Math.atan2(p.vy, p.vx);
        gameCtx.beginPath();
        gameCtx.moveTo(p.x - Math.cos(sa) * len * 0.5, p.y - Math.sin(sa) * len * 0.5);
        gameCtx.lineTo(p.x + Math.cos(sa) * len * 0.5, p.y + Math.sin(sa) * len * 0.5);
        gameCtx.stroke();
    } else if (p.type === 'debris') {
        gameCtx.translate(p.x, p.y);
        gameCtx.rotate(p.angle);
        if (p.vertices && p.vertices.length >= 3) {
            gameCtx.beginPath();
            gameCtx.moveTo(p.vertices[0].x, p.vertices[0].y);
            for (var vi = 1; vi < p.vertices.length; vi++) {
                gameCtx.lineTo(p.vertices[vi].x, p.vertices[vi].y);
            }
            gameCtx.closePath();
            gameCtx.fill();
        } else {
            gameCtx.fillRect(-p.radius, -p.radius * 0.5, p.radius * 2, p.radius);
        }
    }

    gameCtx.restore();
}

function drawRingWaves() {
    gameCtx.save();
    gameCtx.globalCompositeOperation = 'lighter';
    for (var i = 0; i < gameState.ringWaves.length; i++) {
        var r = gameState.ringWaves[i];
        gameCtx.save();
        gameCtx.globalAlpha = r.alpha;
        gameCtx.strokeStyle = r.color;
        gameCtx.lineWidth = r.lineWidth;
        gameCtx.beginPath();
        gameCtx.arc(r.x, r.y, r.radius, 0, Math.PI * 2);
        gameCtx.stroke();
        gameCtx.restore();
    }
    gameCtx.restore();
}

function drawHUD() {

function initGame(canvasElement) {
    gameCanvas = canvasElement;
    gameCtx = gameCanvas.getContext('2d');
    canvasW = gameCanvas.width = window.innerWidth;
    canvasH = gameCanvas.height = window.innerHeight;

    gameState.players = [createPlayer(0)];
    gameState.enemies = [];
    gameState.asteroids = [];
    gameState.bullets = [];
    gameState.particles = [];
    gameState.ringWaves = [];
    gameState.explosionZones = [];
    gameState.enemyBullets = [];
    gameState.lasers = [];
    gameState.shieldPickups = [];
    gameState.score = 0;
    gameState.spawnTimers.enemy = 0;
    gameState.spawnTimers.asteroid = 0;
    gameState.spawnTimers.carrier = 0;
    gameState.carriers = [];
    gameState.time = 0;
    gameState.deltaTime = 0;
    gameState.screenShake.intensity = 0;
    gameState.paused = false;
    gameLastTimestamp = 0;
}

function updateGame(timestamp, mouseX, mouseY, mouseDown) {
    if (gameLastTimestamp === 0) gameLastTimestamp = timestamp;
    var dt = timestamp - gameLastTimestamp;
    gameLastTimestamp = timestamp;

    if (dt > 100) dt = 16;

    gameState.deltaTime = dt;
    gameState.time = timestamp;

    if (gameState.paused) {
        return gameState.explosionZones;
    }

    canvasW = gameCanvas.width;
    canvasH = gameCanvas.height;

    var ms = gameState.mouse;
    ms.prevX = ms.x;
    ms.prevY = ms.y;
    if (mouseX !== ms.x || mouseY !== ms.y) {
        ms.lastMoveTime = timestamp;
    }
    ms.x = mouseX;
    ms.y = mouseY;
    ms.down = !!mouseDown;

    updateParticleBudget();
    _perf.start('update:player');
    updatePlayers(dt);
    _perf.end('update:player');
    _perf.start('update:bullets');
    updateBullets(dt);
    _perf.end('update:bullets');
    _perf.start('update:carrier');
    updateCarriers(dt);
    _perf.end('update:carrier');
    _perf.start('update:enemies');
    updateEnemies(dt);
    _perf.end('update:enemies');
    _perf.start('update:asteroids');
    updateAsteroids(dt);
    _perf.end('update:asteroids');
    _perf.start('update:eBullets');
    updateEnemyBullets(dt);
    _perf.end('update:eBullets');
    _perf.start('update:lasers');
    updateLasers(dt);
    _perf.end('update:lasers');
    _perf.start('update:pickups');
    updateShieldPickups(dt);
    _perf.end('update:pickups');
    _perf.start('update:collisions');
    checkCollisions();
    _perf.end('update:collisions');
    _perf.start('update:particles');
    updateParticles(dt);
    _perf.end('update:particles');
    _perf.start('update:expZones');
    updateExplosionZones(dt);
    _perf.end('update:expZones');
    _perf.start('update:rings');
    updateRingWaves(dt);
    _perf.end('update:rings');

    _perf.count('carrier', gameState.carriers.length);
    _perf.count('enemies', gameState.enemies.length);
    _perf.count('asteroids', gameState.asteroids.length);
    _perf.count('bullets', gameState.bullets.length);
    _perf.count('eBullets', gameState.enemyBullets.length);
    _perf.count('particles', gameState.particles.length);
    _perf.count('lasers', gameState.lasers.length);
    _perf.count('rings', gameState.ringWaves.length);
    _perf.count('expZones', gameState.explosionZones.length);
    _perf.count('pickups', gameState.shieldPickups.length);

    _perf.start('render:total');
    renderGame();
    _perf.end('render:total');

    return gameState.explosionZones;
}

var _shipParallaxX = 0, _shipParallaxY = 0;

var sharedMouseDown = false;

document.addEventListener('mousedown', function(e) {
    if (e.button === 0) sharedMouseDown = true;
});
document.addEventListener('mouseup', function(e) {
    if (e.button === 0) sharedMouseDown = false;
});

document.addEventListener('mousemove', function(e) {
    sharedMouseX = e.clientX;
    sharedMouseY = e.clientY;
    sharedMouseNX = e.clientX / window.innerWidth;
    sharedMouseNY = 1.0 - (e.clientY / window.innerHeight);
    starfieldMouseX = (e.clientX / window.innerWidth - 0.5) * 2;
    starfieldMouseY = (e.clientY / window.innerHeight - 0.5) * 2;
    mouseInWindow = true;
});

document.addEventListener('mouseleave', function() {
    mouseInWindow = false;
});

document.addEventListener('mouseenter', function() {
    mouseInWindow = true;
});

if (EMBED_MODE) {
    window.addEventListener('message', function(e) {
        if (e.data && e.data.type === 'mouseUpdate') {
            sharedMouseX = e.data.x;
            sharedMouseY = e.data.y;
            sharedMouseNX = e.data.nx;
            sharedMouseNY = e.data.ny;
            sharedMouseDown = e.data.down;
            mouseInWindow = e.data.inWindow;
        }
    });
}

// === SECTION: State Serialization (host -> guests) ===
function serializeState() {
    return {
        players: gameState.players.map(function(p) {
            return {
                id: p.id, x: p.x, y: p.y, angle: p.angle,
                shields: p.shields, maxShields: p.maxShields,
                baseShields: p.baseShields,
                alive: p.alive, level: p.level,
                invulnerable: p.invulnerable, scale: p.scale,
                opacity: p.opacity, respawning: p.respawning,
                warpPhase: p.warpPhase, warpStart: p.warpStart,
                shieldAngle: p.shieldAngle,
                color: p.color, label: p.label,
                colorIndex: p.colorIndex, radius: p.radius,
                playerId: p.playerId, isLocal: p.isLocal,
                shieldRechargeTimer: p.shieldRechargeTimer,
                shieldRechargeRate: p.shieldRechargeRate,
                deathTime: p.deathTime,
                drifting: p.drifting, driftVx: p.driftVx, driftVy: p.driftVy,
            };
        }),
        enemies: gameState.enemies.filter(function(e) { return e.alive || e.dying; }).map(function(e) {
            return {
                id: e.id, x: e.x, y: e.y, radius: e.radius,
                color: e.color, alive: e.alive, dying: e.dying,
                fadeIn: e.fadeIn, shields: e.shields,
                maxShields: e.maxShields, shieldAngle: e.shieldAngle,
                rotation: e.rotation, damageFlashTimer: e.damageFlashTimer,
                charging: e.charging || 0, type: e.type,
                size: e.size, hp: e.hp, elite: e.elite || false,
                vx: e.vx, vy: e.vy,
                dirChangeTimer: e.dirChangeTimer,
                behavior: e.behavior,
                fireTimer: e.fireTimer,
                burstRemaining: e.burstRemaining,
                burstTimer: e.burstTimer,
            };
        }),
        asteroids: gameState.asteroids.filter(function(a) { return a.alive; }).map(function(a) {
            return {
                id: a.id, x: a.x, y: a.y, radius: a.radius,
                rotation: a.rotation, size: a.size,
                vertices: a.vertices, craters: a.craters,
                alive: a.alive,
                vx: a.vx, vy: a.vy,
                rotationSpeed: a.rotationSpeed,
                baseRadius: a.baseRadius,
            };
        }),
        carriers: gameState.carriers.map(function(car) {
            return {
                id: car.id, x: car.x, y: car.y,
                radius: car.radius, rotation: car.rotation,
                alive: car.alive, dying: car.dying,
                hp: car.hp, maxHp: car.maxHp,
                shields: car.shields, maxShields: car.maxShields,
                shieldAngle: car.shieldAngle, fadeIn: car.fadeIn,
                color: car.color, damageFlashTimer: car.damageFlashTimer,
                chunks: car.chunks || [],
                vx: car.vx, vy: car.vy,
            };
        }),
        bullets: gameState.bullets.map(function(b) {
            return {
                id: b.id, x: b.x, y: b.y, angle: b.angle,
                trail: b.trail, color: b.color, ownerId: b.ownerId,
            };
        }),
        enemyBullets: gameState.enemyBullets.map(function(eb) {
            return {
                id: eb.id, x: eb.x, y: eb.y, radius: eb.radius,
                color: eb.color, trail: eb.trail, pulsePhase: eb.pulsePhase,
                vx: eb.vx, vy: eb.vy,
            };
        }),
        lasers: gameState.lasers.map(function(l) {
            return {
                id: l.id, x1: l.x1, y1: l.y1, x2: l.x2, y2: l.y2,
                color: l.color, alpha: l.alpha, width: l.width, hit: l.hit,
                life: l.life,
            };
        }),
        shieldPickups: gameState.shieldPickups.map(function(sp) {
            return {
                id: sp.id, x: sp.x, y: sp.y, radius: sp.radius,
                pulsePhase: sp.pulsePhase, life: sp.life, type: sp.type,
            };
        }),
        explosionZones: gameState.explosionZones.map(function(ez) {
            return {
                x: ez.x, y: ez.y, currentRadius: ez.currentRadius, strength: ez.strength,
            };
        }),
        score: gameState.score,
        time: gameState.time,
        nextEntityId: _nextEntityId,
        spawnTimers: gameState.spawnTimers,
    };
}

// === SECTION: Guest Rendering ===
function applyRemoteState(state) {
    gameState.players = state.players;
    gameState.enemies = state.enemies;
    gameState.asteroids = state.asteroids;
    gameState.carriers = state.carriers;
    gameState.bullets = state.bullets;
    gameState.enemyBullets = state.enemyBullets;
    gameState.lasers = state.lasers;
    gameState.shieldPickups = state.shieldPickups;
    gameState.explosionZones = state.explosionZones;
    gameState.score = state.score;
    gameState.time = state.time;
}

function diffAndTriggerEffects(prev, curr) {
    // Enemies that just started dying
    var prevAlive = {};
    for (var i = 0; i < prev.enemies.length; i++) {
        if (prev.enemies[i].alive && !prev.enemies[i].dying) prevAlive[prev.enemies[i].id] = prev.enemies[i];
    }

    // Enemies that disappeared (were alive/dying, now gone)
    var currIds = {};
    for (var k = 0; k < curr.enemies.length; k++) currIds[curr.enemies[k].id] = true;
    for (var m = 0; m < prev.enemies.length; m++) {
        var pe = prev.enemies[m];
        if (!currIds[pe.id] && (pe.alive || pe.dying)) {
            explodeEnemy(pe.x, pe.y, pe.color);
            spawnRingWave(pe.x, pe.y, 60, 3, pe.color);
            addExplosionZone(pe.x, pe.y, 120);
            gameState.screenFlashAlpha = Math.max(gameState.screenFlashAlpha, 0.08);
        }
    }

    // Asteroids that disappeared
    var currAstIds = {};
    for (var n = 0; n < curr.asteroids.length; n++) currAstIds[curr.asteroids[n].id] = true;
    for (var o = 0; o < prev.asteroids.length; o++) {
        var pa = prev.asteroids[o];
        if (!currAstIds[pa.id] && pa.alive) {
            explodeAsteroid(pa.x, pa.y, pa.size);
            addExplosionZone(pa.x, pa.y, pa.radius > 40 ? 100 : 60);
        }
    }

    // Player deaths
    for (var q = 0; q < curr.players.length; q++) {
        var cp = curr.players[q];
        var pp = null;
        for (var r = 0; r < prev.players.length; r++) {
            if (prev.players[r].id === cp.id) { pp = prev.players[r]; break; }
        }
        if (pp && pp.alive && !cp.alive) {
            explodePlayer(cp.x, cp.y);
            gameState.screenFlashAlpha = 0.25;
            gameState.screenShake.intensity = 18;
        }
    }

    // Carrier deaths
    var prevCarrierIds = {};
    for (var pci = 0; pci < (prev.carriers || []).length; pci++) {
        var pc = prev.carriers[pci];
        if (pc.alive) prevCarrierIds[pc.id] = pc;
    }
    for (var cci = 0; cci < (curr.carriers || []).length; cci++) {
        var cc = curr.carriers[cci];
        if (!cc.alive && prevCarrierIds[cc.id]) {
            gameState.screenFlashAlpha = 0.6;
            gameState.screenShake.intensity = 25;
        }
    }
    // Carriers that disappeared entirely
    var currCarrierIds = {};
    for (var cci2 = 0; cci2 < (curr.carriers || []).length; cci2++) currCarrierIds[curr.carriers[cci2].id] = true;
    for (var pci2 = 0; pci2 < (prev.carriers || []).length; pci2++) {
        var pc2 = prev.carriers[pci2];
        if ((pc2.alive || pc2.dying) && !currCarrierIds[pc2.id]) {
            gameState.screenFlashAlpha = 0.6;
            gameState.screenShake.intensity = 25;
        }
    }
}

function guestLoop(timestamp) {
    if (role !== 'guest') return;

    // Send input to server
    wsEmit('input', { mouseX: sharedMouseX, mouseY: sharedMouseY, mouseDown: sharedMouseDown });

    if (remoteState) {
        // Diff and trigger local effects before applying new state
        if (prevRemoteState) {
            diffAndTriggerEffects(prevRemoteState, remoteState);
        }
        prevRemoteState = remoteState;

        // Apply remote state to local gameState for rendering
        applyRemoteState(remoteState);

        // Run particle/ring/effect updates locally
        // NOTE: Do NOT call updateExplosionZones — host sends authoritative zones.
        // Running it locally corrupts zones (missing maxRadius/fadeDuration → NaN → kills plasma shader).
        var dt = 16; // approximate

        // Spawn engine/drift trail particles locally for all alive players
        for (var pi = 0; pi < gameState.players.length; pi++) {
            var tp = gameState.players[pi];
            if (!tp || !tp.alive || tp.respawning) continue;
            for (var si = 0; si < tp.level; si++) {
                if (tp.level > 1 && Math.random() > 0.5) continue;
                var etOffset = tp.level === 1 ? 0 : (si - (tp.level - 1) / 2) * 8;
                var perpA = tp.angle + Math.PI / 2;
                var trailX = tp.x - Math.cos(tp.angle) * 12 + Math.cos(perpA) * etOffset;
                var trailY = tp.y - Math.sin(tp.angle) * 12 + Math.sin(perpA) * etOffset;
                if (tp.drifting) {
                    driftTrail(trailX, trailY, tp.angle, tp.driftVx, tp.driftVy, tp.color);
                } else {
                    engineTrail(trailX, trailY, tp.angle);
                }
            }
        }

        updateParticles(dt);
        updateRingWaves(dt);
        if (gameState.screenFlashAlpha > 0) gameState.screenFlashAlpha -= 0.05;
        if (gameState.screenShake.intensity > 0) gameState.screenShake.intensity *= 0.85;

        renderGame();
    }

    requestAnimationFrame(guestLoop);
}

// === SECTION: Master Game Loop ===
function masterLoop(timestamp) {
    if (role !== 'host') return;

    var explosionZones = updateGame(timestamp, sharedMouseX, sharedMouseY, sharedMouseDown);

    if (EMBED_MODE && window.parent !== window) {
        var sp = gameState.players[0];
        var msg = { type: 'voidDriftState', time: timestamp, explosionZones: [], player: null };
        if (sp) {
            msg.player = { x: sp.x, y: sp.y, alive: sp.alive, invulnerable: sp.invulnerable, invulnerableTimer: sp.invulnerableTimer, deathTime: sp.deathTime, glideVx: sp.glideVx, glideVy: sp.glideVy };
        }
        for (var zi = 0; zi < gameState.explosionZones.length; zi++) {
            var z = gameState.explosionZones[zi];
            msg.explosionZones.push({ x: z.x, y: z.y, currentRadius: z.currentRadius, strength: z.strength });
        }
        window.parent.postMessage(msg, '*');
    }

    // Broadcast state to guests
    wsEmit('state', serializeState());

    // Plasma rendering is handled in the starfield loop (same RAF = guaranteed order)

    requestAnimationFrame(masterLoop);
}

// === SECTION: Socket Event Handlers ===
wsOn('role', function(data) {
    role = data.role;
    myPlayerId = data.playerId;
    myColorIndex = data.colorIndex;

    if (role === 'host') {
        // Full game init
        initGame(document.getElementById('game-canvas'));
        // Set the local player's color from server
        gameState.players[0].color = PLAYER_COLORS[myColorIndex];
        gameState.players[0].label = PLAYER_LABELS[myColorIndex];
        gameState.players[0].colorIndex = myColorIndex;
        gameState.players[0].playerId = myPlayerId;
        gameState.players[0].isLocal = true;
        requestAnimationFrame(masterLoop);
    } else {
        // Guest — canvas setup only, wait for state
        gameCanvas = document.getElementById('game-canvas');
        gameCtx = gameCanvas.getContext('2d');
        canvasW = gameCanvas.width = window.innerWidth;
        canvasH = gameCanvas.height = window.innerHeight;
        requestAnimationFrame(guestLoop);
    }
});

wsOn('current-state', function(data) {
    if (role === 'guest') {
        remoteState = data;
    }
});

wsOn('guest-input', function(data) {
    if (role === 'host') {
        guestInputs[data.playerId] = { mouseX: data.mouseX, mouseY: data.mouseY, mouseDown: data.mouseDown };
    }
});

wsOn('player-joined', function(data) {
    if (role === 'host') {
        var newPlayer = createPlayer(data.colorIndex);
        newPlayer.playerId = data.playerId;
        newPlayer.isLocal = false;
        var spawn = findSafeSpawn();
        newPlayer.x = spawn.x;
        newPlayer.y = spawn.y;
        newPlayer.invulnerable = true;
        newPlayer.invulnerableTimer = 2000;
        gameState.players.push(newPlayer);
        playerMap[data.playerId] = newPlayer.id;
    }
});

wsOn('player-left', function(data) {
    if (role === 'host') {
        var entityId = playerMap[data.playerId];
        gameState.players = gameState.players.filter(function(p) { return p.id !== entityId; });
        delete playerMap[data.playerId];
        delete guestInputs[data.playerId];
    }
});

wsOn('state', function(data) {
    if (role === 'guest') {
        remoteState = data;
    }
});

wsOn('promote-to-host', function(data) {
    role = 'host';
    // Set up game canvas if not already done
    if (!gameCanvas) {
        gameCanvas = document.getElementById('game-canvas');
        gameCtx = gameCanvas.getContext('2d');
        canvasW = gameCanvas.width = window.innerWidth;
        canvasH = gameCanvas.height = window.innerHeight;
    }
    if (data.state) {
        applyRemoteState(data.state);
        _nextEntityId = data.state.nextEntityId || _nextEntityId;
        gameState.spawnTimers = data.state.spawnTimers || gameState.spawnTimers;
        // Re-initialize arrays that guests don't track
        if (!gameState.particles) gameState.particles = [];
        if (!gameState.ringWaves) gameState.ringWaves = [];
    }
    // Initialize game state arrays that aren't part of remote state
    gameState.particles = gameState.particles || [];
    gameState.ringWaves = gameState.ringWaves || [];
    gameState.mouse = gameState.mouse || { x: 0, y: 0, prevX: 0, prevY: 0, lastMoveTime: 0 };
    gameLastTimestamp = 0;
    // Mark local player
    for (var i = 0; i < gameState.players.length; i++) {
        if (gameState.players[i].playerId === myPlayerId) {
            gameState.players[i].isLocal = true;
        } else {
            gameState.players[i].isLocal = false;
        }
    }
    requestAnimationFrame(masterLoop);
});

// === SECTION: Initialization ===
function startAll() {
    if (!EMBED_MODE) initPlasma();
    // Game canvas setup and game loop start are deferred until socket 'role' event
}

// Consolidated resize handler
window.addEventListener('resize', function() {
    if (!EMBED_MODE) resizePlasma();
    var gc = document.getElementById('game-canvas');
    gc.width = window.innerWidth;
    gc.height = window.innerHeight;
    canvasW = window.innerWidth;
    canvasH = window.innerHeight;
});

startAll();

// === SECTION: Audio System (Web Audio API) ===
var _audioCtx = null;
var _masterGain = null;   // master volume
var _sfxGain = null;      // SFX bus
var _musicGain = null;    // music bus
var _sfxBuffers = {};     // name -> AudioBuffer (decoded, ready to play)
var _audioReady = false;
var _musicStarted = false;

// SFX registry — add entries here as sounds are added to /sounds/
// Each key is the name you call sfx('name') with, value is the file path
var _sfxFiles = {
    'blaster': '/sounds/Single Space Ship Blaster, Short.mp3',
    'laser': '/sounds/Sci-fi Laser Beam.mp3',
    'torpedo': '/sounds/Sci-fi  Photon Cannon Charge.mp3',
    'asteroid': '/sounds/Sci-fi  Astroid Explosion.mp3',
    'explosion1': '/sounds/Sci-fi  Spaceship Explosion.mp3',
    'explosion2': '/sounds/Sci-fi  Spaceship Explosion (1).mp3',
    'explosion3': '/sounds/Sci-fi  Spaceship Explosion (2).mp3',
    'explosion4': '/sounds/Sci-fi  Spaceship Explosion (3).mp3',
    'explosion5': '/sounds/Sci-fi  Spaceship Explosion (4).mp3',
    'explosion6': '/sounds/Sci-fi  Spaceship Explosion (5).mp3',
    'shield-pickup': '/sounds/Sci-fi  Electric Shield Charge Up.mp3',
};

function initAudio() {
    if (_audioCtx) return;
    _audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    // Master -> speakers
    _masterGain = _audioCtx.createGain();
    _masterGain.gain.value = 1.0;
    _masterGain.connect(_audioCtx.destination);

    // SFX bus -> master
    _sfxGain = _audioCtx.createGain();
    _sfxGain.gain.value = 0.7;
    _sfxGain.connect(_masterGain);

    // Music bus -> master
    _musicGain = _audioCtx.createGain();
    _musicGain.gain.value = 0.5;
    _musicGain.connect(_masterGain);

    // Resume if suspended (autoplay policy)
    if (_audioCtx.state === 'suspended') {
        _audioCtx.resume();
    }

    // Load all registered SFX
    var names = Object.keys(_sfxFiles);
    for (var i = 0; i < names.length; i++) {
        loadSfx(names[i], _sfxFiles[names[i]]);
    }

    _audioReady = true;
}

function loadSfx(name, url) {
    fetch(url)
        .then(function(r) { return r.arrayBuffer(); })
        .then(function(buf) { return _audioCtx.decodeAudioData(buf); })
        .then(function(decoded) { _sfxBuffers[name] = decoded; })
        .catch(function(err) { console.warn('Failed to load SFX: ' + name, err); });
}

// Play a sound effect — call sfx('blaster') etc.
// Returns the source node if you need to stop it early.
// Options: { volume: 0-1, rate: playback speed, pan: -1 to 1 }
function sfx(name, opts) {
    if (!_audioReady || !_sfxBuffers[name]) return null;
    opts = opts || {};

    var source = _audioCtx.createBufferSource();
    source.buffer = _sfxBuffers[name];
    source.playbackRate.value = opts.rate || 1;

    // Per-sound gain
    var gain = _audioCtx.createGain();
    gain.gain.value = opts.volume !== undefined ? opts.volume : 1;

    // Optional stereo panning
    if (opts.pan !== undefined && opts.pan !== 0) {
        var panner = _audioCtx.createStereoPanner();
        panner.pan.value = opts.pan;
        source.connect(gain);
        gain.connect(panner);
        panner.connect(_sfxGain);
    } else {
        source.connect(gain);
        gain.connect(_sfxGain);
    }

    source.start(0);
    return source;
}

// Spatial SFX helper — auto-calculates volume and pan from world position
function sfxAt(name, x, y, opts) {
    opts = opts || {};
    var cx = canvasW / 2;
    var cy = canvasH / 2;
    var dx = x - cx;
    var dy = y - cy;
    var dist = Math.sqrt(dx * dx + dy * dy);
    var maxDist = Math.sqrt(cx * cx + cy * cy);
    var distVolume = clamp(1 - (dist / maxDist) * 0.6, 0.2, 1);
    var pan = clamp(dx / cx, -1, 1);
    opts.volume = (opts.volume !== undefined ? opts.volume : 1) * distVolume;
    opts.pan = pan;
    return sfx(name, opts);
}

function sfxExplosion(x, y, volume) {
    var idx = randInt(1, 6);
    sfxAt('explosion' + idx, x, y, { volume: volume || 0.5, rate: rand(0.8, 1.2) });
}

// === Music (still uses HTML Audio for streaming long tracks) ===
var _musicTracks = ["/sounds/Nebula 1.mp3","/sounds/Nebula 2.mp3","/sounds/Nebula 3.mp3","/sounds/Nebula 4.mp3"];
// Shuffle the playlist so each session gets a different order
for (var _mi = _musicTracks.length - 1; _mi > 0; _mi--) {
    var _mj = Math.floor(Math.random() * (_mi + 1));
    var _mt = _musicTracks[_mi]; _musicTracks[_mi] = _musicTracks[_mj]; _musicTracks[_mj] = _mt;
}
var _musicIndex = Math.floor(Math.random() * _musicTracks.length);
var _musicAudio = null;

function startMusic() {
    if (_musicStarted) return;
    _musicStarted = true;
    playNextTrack();
}

function playNextTrack() {
    _musicAudio = new Audio(_musicTracks[_musicIndex]);
    _musicAudio.volume = 0.5;
    _musicAudio.addEventListener('ended', function() {
        _musicIndex = (_musicIndex + 1) % _musicTracks.length;
        playNextTrack();
    });
    _musicAudio.play().catch(function() { _musicStarted = false; });
}

// === Splash screen ===
var _splashDismissed = false;
document.getElementById('playBtn').addEventListener('click', function(e) {
    e.stopPropagation();
    if (_splashDismissed) return;
    _splashDismissed = true;
    var splash = document.getElementById('splashScreen');
    splash.style.transition = 'opacity 0.6s ease';
    splash.style.opacity = '0';
    setTimeout(function() { splash.style.display = 'none'; }, 600);
    initAudio();
    startMusic();
});
document.getElementById('splashScreen').addEventListener('click', function() {
    document.getElementById('playBtn').click();
});
</script>
